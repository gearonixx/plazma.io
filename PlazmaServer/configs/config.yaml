components_manager:
  coro_pool:
    initial_size: 500
    max_size: 1000

  task_processors:
    main-task-processor:
      worker_threads: $worker-threads
      thread_name: main-worker

    fs-task-processor:
      thread_name: fs-worker
      worker_threads: $worker-fs-threads

  default_task_processor: main-task-processor

  components:
    server:
      listener:
        port: $server-port
        task_processor: main-task-processor
      listener-monitor:
        port: 8086
        task_processor: main-task-processor

    logging:
      fs-task-processor: fs-task-processor
      loggers:
        default:
          file_path: '@stderr'
          level: $logger-level
          overflow_behavior: discard

    scylla:
      dbconnection: scylladb
      consistency: local_quorum
      serial_consistency: local_serial
      request_timeout: 10s
      pool:
        num_threads_io: 2
        core_connections_per_host: 4
      app_name: scylla_app_name_4
      retry_policy: default
      load_balancing_policy: round_robin
      speculative_execution:
        enabled: false
        max_attempts: 2
        delay: 100ms
      default_keyspace: plazma

    dynamic-config:
      defaults:
        HTTP_CLIENT_CONNECTION_POOL_SIZE: 1000
        POSTGRES_DEFAULT_COMMAND_CONTROL:
          network_timeout_ms: 750
          statement_timeout_ms: 500

    http-client:
      load-enabled: true
    http-client-core:
      load-enabled: true
      fs-task-processor: fs-task-processor

    dns-client:
      fs-task-processor: fs-task-processor

    handler-auth-login:
      path: /v1/auth/login
      method: POST
      task_processor: main-task-processor
      throttling_enabled: false
      url_trailing_slash: strict-match

    # POST /v1/videos/upload — legacy path kept for compatibility
    handler-videos-create:
      path: /v1/videos/upload
      method: POST
      task_processor: main-task-processor
      throttling_enabled: false
      url_trailing_slash: strict-match
      max_request_size: 104857600

    # POST /v1/videos — canonical REST path
    handler-videos-create-v2:
      path: /v1/videos
      method: POST
      task_processor: main-task-processor
      throttling_enabled: false
      url_trailing_slash: strict-match
      max_request_size: 104857600

    handler-videos-list:
      path: /v1/videos
      method: GET
      task_processor: main-task-processor
      throttling_enabled: false
      url_trailing_slash: strict-match

    handler-videos-get:
      path: /v1/videos/{id}
      method: GET
      task_processor: main-task-processor
      throttling_enabled: false
      url_trailing_slash: strict-match

    handler-videos-delete:
      path: /v1/videos/{id}
      method: DELETE
      task_processor: main-task-processor
      throttling_enabled: false
      url_trailing_slash: strict-match

    handler-videos-view:
      path: /v1/videos/{id}/view
      method: POST
      task_processor: main-task-processor
      throttling_enabled: false
      url_trailing_slash: strict-match

    handler-my-videos:
      path: /v1/users/me/videos
      method: GET
      task_processor: main-task-processor
      throttling_enabled: false
      url_trailing_slash: strict-match

    # ── Playlists ─────────────────────────────────────────────────────────
    handler-playlists-list:
      path: /v1/playlists
      method: GET
      task_processor: main-task-processor
      throttling_enabled: false
      url_trailing_slash: strict-match

    handler-playlists-create:
      path: /v1/playlists
      method: POST
      task_processor: main-task-processor
      throttling_enabled: false
      url_trailing_slash: strict-match
      max_request_size: 16384

    handler-playlists-detail:
      path: /v1/playlists/{id}
      method: GET
      task_processor: main-task-processor
      throttling_enabled: false
      url_trailing_slash: strict-match

    handler-playlists-rename:
      path: /v1/playlists/{id}
      method: PATCH
      task_processor: main-task-processor
      throttling_enabled: false
      url_trailing_slash: strict-match
      max_request_size: 16384

    handler-playlists-delete:
      path: /v1/playlists/{id}
      method: DELETE
      task_processor: main-task-processor
      throttling_enabled: false
      url_trailing_slash: strict-match

    handler-playlists-items-list:
      path: /v1/playlists/{id}/items
      method: GET
      task_processor: main-task-processor
      throttling_enabled: false
      url_trailing_slash: strict-match

    handler-playlists-item-add:
      path: /v1/playlists/{id}/items
      method: POST
      task_processor: main-task-processor
      throttling_enabled: false
      url_trailing_slash: strict-match
      max_request_size: 16384

    handler-playlists-item-remove:
      path: /v1/playlists/{id}/items/{video_id}
      method: DELETE
      task_processor: main-task-processor
      throttling_enabled: false
      url_trailing_slash: strict-match

    handler-playlists-by-video:
      path: /v1/users/me/playlists/by_video/{video_id}
      method: GET
      task_processor: main-task-processor
      throttling_enabled: false
      url_trailing_slash: strict-match

    s3-client: {}

    es-search:
      url: $es-url
      index: videos
