name: CI

on:
  push:
    branches: [master, "ci-*"]
    paths:
      - 'Plazma/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [master]
    paths:
      - 'Plazma/**'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Ubuntu ──────────────────────────────────────────────────────────────────
  build-ubuntu:
    name: Build (Ubuntu 22.04)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 + MPV
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake ninja-build pkg-config \
            qt6-base-dev qt6-declarative-dev qt6-tools-dev \
            qt6-l10n-tools libqt6opengl6-dev qml6-module-qtquick \
            libmpv-dev

      - name: Cache TdLib
        id: cache-tdlib
        uses: actions/cache@v4
        with:
          path: ~/tdlib-install
          key: tdlib-1.8.61-ubuntu-22.04-${{ runner.arch }}

      - name: Build TdLib
        if: steps.cache-tdlib.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 --branch v1.8.61 https://github.com/tdlib/td.git ~/td
          cmake -B ~/td/build -S ~/td \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=~/tdlib-install \
            -DTD_ENABLE_LTO=OFF
          cmake --build ~/td/build -j$(nproc)
          cmake --install ~/td/build

      - name: Build Plazma
        run: |
          cmake -B Plazma/build -S Plazma \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DTd_DIR=~/tdlib-install/lib/cmake/Td
          cmake --build Plazma/build -j$(nproc)

      - name: Debug via tmate (on failure, ci-* branches and manual dispatch only)
        if: |
          failure() && (
            startsWith(github.ref_name, 'ci-') ||
            github.event_name == 'workflow_dispatch'
          )
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 5
        with:
          limit-access-to-actor: true

  # ── Arch Linux ──────────────────────────────────────────────────────────────
  build-arch:
    name: Build (Arch Linux)
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel cmake ninja pkgconf git \
            qt6-base qt6-declarative qt6-tools qt6-svg \
            mpv tdlib

      - name: Build Plazma
        run: |
          cmake -B Plazma/build -S Plazma \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build Plazma/build -j$(nproc)

  # ── Windows ─────────────────────────────────────────────────────────────────
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: 'qtimageformats'
          cache: true

      - name: Setup MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache vcpkg packages (openssl, zlib, gperf)
        uses: actions/cache@v4
        with:
          path: C:/vcpkg/installed
          key: vcpkg-tdlib-deps-${{ runner.arch }}-v2

      - name: Install TdLib build deps via vcpkg
        shell: pwsh
        run: vcpkg install openssl:x64-windows zlib:x64-windows gperf:x64-windows

      - name: Cache TdLib install
        id: cache-tdlib
        uses: actions/cache@v4
        with:
          path: C:/tdlib-install
          key: tdlib-1.8.61-${{ runner.arch }}-msvc2022-v2

      - name: Build TdLib from source
        if: steps.cache-tdlib.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          git clone --depth=1 --branch v1.8.61 https://github.com/tdlib/td.git C:/td
          cmake -B C:/td/build -S C:/td `
            -G "Ninja" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX=C:/tdlib-install `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DTD_ENABLE_LTO=OFF
          cmake --build C:/td/build --target install -- -j 2

      - name: Cache MPV SDK
        id: cache-mpv
        uses: actions/cache@v4
        with:
          path: mpv-sdk
          key: mpv-sdk-20240714-c7e8d31

      - name: Download MPV SDK
        if: steps.cache-mpv.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://downloads.sourceforge.net/project/mpv-player-windows/libmpv/mpv-dev-x86_64-20240714-git-c7e8d31.7z"
          Invoke-WebRequest -Uri $url -OutFile mpv-dev.7z
          7z x mpv-dev.7z -ompv-sdk
          Push-Location mpv-sdk
          lib /def:mpv.def /name:libmpv-2.dll /out:mpv.lib /MACHINE:X64
          Copy-Item mpv.lib libmpv.dll.a -Force
          Pop-Location

      - name: Build Plazma
        shell: pwsh
        env:
          MPV_DIR: ${{ github.workspace }}/mpv-sdk
        run: |
          cmake -B Plazma/build -S Plazma -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DCMAKE_DISABLE_FIND_PACKAGE_PkgConfig=ON `
            -DTd_DIR=C:/tdlib-install/lib/cmake/Td
          cmake --build Plazma/build

      - name: Debug via tmate (on failure, ci-* branches and manual dispatch only)
        if: |
          failure() && (
            startsWith(github.ref_name, 'ci-') ||
            github.event_name == 'workflow_dispatch'
          )
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 5
        with:
          limit-access-to-actor: true
