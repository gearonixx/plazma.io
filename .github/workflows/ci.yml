name: CI

on:
  push:
    branches: [master, "ci-*"]
    paths:
      - 'Plazma/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [master]
    paths:
      - 'Plazma/**'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Ubuntu ──────────────────────────────────────────────────────────────────
  build-ubuntu:
    name: Build (Ubuntu 22.04)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools + MPV
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake ninja-build pkg-config gperf \
            libgl1-mesa-dev libxkbcommon-dev \
            libfontconfig1-dev libfreetype-dev libxcb-cursor0 \
            libmpv-dev

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          host: linux
          target: desktop
          arch: gcc_64
          modules: 'qtimageformats'
          cache: true

      - name: Cache TdLib
        id: cache-tdlib
        uses: actions/cache@v4
        with:
          path: ~/tdlib-install
          key: tdlib-8fc2344-ubuntu-22.04-${{ runner.arch }}-v2

      - name: Build TdLib
        if: steps.cache-tdlib.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/tdlib/td.git "$HOME/td"
          git -C "$HOME/td" checkout 8fc2344f3e3d
          cmake -B "$HOME/td/build" -S "$HOME/td" \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$HOME/tdlib-install" \
            -DTD_ENABLE_LTO=OFF
          cmake --build "$HOME/td/build" -j$(nproc)
          cmake --install "$HOME/td/build"

      - name: Build Plazma
        run: |
          cmake -B Plazma/build -S Plazma \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DTd_DIR="$HOME/tdlib-install/lib/cmake/Td"
          cmake --build Plazma/build -j$(nproc)

      - name: Debug via tmate (on failure, ci-* branches and manual dispatch only)
        if: |
          failure() && (
            startsWith(github.ref_name, 'ci-') ||
            github.event_name == 'workflow_dispatch'
          )
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 5
        with:
          limit-access-to-actor: true

  # ── Arch Linux ──────────────────────────────────────────────────────────────
  build-arch:
    name: Build (Arch Linux)
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel cmake ninja pkgconf git gperf \
            qt6-base qt6-declarative qt6-tools qt6-svg \
            mpv openssl zlib

      - name: Cache TdLib
        id: cache-tdlib
        uses: actions/cache@v4
        with:
          path: /root/tdlib-install
          key: tdlib-8fc2344-arch-${{ runner.arch }}-v2

      - name: Build TdLib
        if: steps.cache-tdlib.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/tdlib/td.git /root/td
          git -C /root/td checkout 8fc2344f3e3d
          cmake -B /root/td/build -S /root/td \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/root/tdlib-install \
            -DTD_ENABLE_LTO=OFF
          cmake --build /root/td/build -j$(nproc)
          cmake --install /root/td/build

      - name: Build Plazma
        run: |
          cmake -B Plazma/build -S Plazma \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DTd_DIR=/root/tdlib-install/lib/cmake/Td
          cmake --build Plazma/build -j$(nproc)

  # ── macOS ───────────────────────────────────────────────────────────────────
  build-macos:
    name: Build (macOS)
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install build deps via Homebrew
        run: |
          brew update
          brew install pkg-config gperf openssl@3 mpv ninja

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          host: mac
          target: desktop
          arch: clang_64
          modules: 'qtimageformats'
          cache: true

      - name: Cache TdLib install
        id: cache-tdlib
        uses: actions/cache@v4
        with:
          path: ~/tdlib-install
          key: tdlib-8fc2344-macos-14-${{ runner.arch }}-v1

      - name: Build TdLib from source
        if: steps.cache-tdlib.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/tdlib/td.git "$HOME/td"
          git -C "$HOME/td" checkout 8fc2344f3e3d
          cmake -B "$HOME/td/build" -S "$HOME/td" \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$HOME/tdlib-install" \
            -DOPENSSL_ROOT_DIR="$(brew --prefix openssl@3)" \
            -DTD_ENABLE_LTO=OFF
          cmake --build "$HOME/td/build" -j$(sysctl -n hw.ncpu)
          cmake --install "$HOME/td/build"

      - name: Build Plazma
        env:
          PKG_CONFIG_PATH: /opt/homebrew/lib/pkgconfig
          # pkg-config emits `-lmpv` without -L; brew's libdir isn't on
          # macOS clang's default search path, so add it explicitly.
          LDFLAGS: -L/opt/homebrew/lib
        run: |
          cmake -B Plazma/build -S Plazma \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DTd_DIR="$HOME/tdlib-install/lib/cmake/Td"
          cmake --build Plazma/build -j$(sysctl -n hw.ncpu)

      - name: Debug via tmate (on failure, ci-* branches and manual dispatch only)
        if: |
          failure() && (
            startsWith(github.ref_name, 'ci-') ||
            github.event_name == 'workflow_dispatch'
          )
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 5
        with:
          limit-access-to-actor: true

  # ── Windows ─────────────────────────────────────────────────────────────────
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: 'qtimageformats'
          cache: true

      - name: Setup MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache vcpkg packages (openssl, zlib, gperf)
        uses: actions/cache@v4
        with:
          path: C:/vcpkg/installed
          key: vcpkg-tdlib-deps-${{ runner.arch }}-v3

      - name: Install TdLib build deps via vcpkg
        shell: pwsh
        run: vcpkg install openssl:x64-windows zlib:x64-windows gperf:x64-windows

      - name: Cache TdLib install
        id: cache-tdlib
        uses: actions/cache@v4
        with:
          path: C:/tdlib-install
          key: tdlib-8fc2344-${{ runner.arch }}-msvc2022-v3

      - name: Build TdLib from source
        if: steps.cache-tdlib.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          git clone https://github.com/tdlib/td.git C:/td
          git -C C:/td checkout 8fc2344f3e3d
          cmake -B C:/td/build -S C:/td `
            -G "Ninja" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX=C:/tdlib-install `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DGPERF_EXECUTABLE=C:/vcpkg/installed/x64-windows/tools/gperf/gperf.exe `
            -DOPENSSL_ROOT_DIR=C:/vcpkg/installed/x64-windows `
            -DTD_ENABLE_LTO=OFF
          cmake --build C:/td/build --target install --parallel 1

      - name: Cache MPV SDK
        id: cache-mpv
        uses: actions/cache@v4
        with:
          path: mpv-sdk
          key: mpv-sdk-20250420-3600c71

      - name: Download MPV SDK
        if: steps.cache-mpv.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://master.dl.sourceforge.net/project/mpv-player-windows/libmpv/mpv-dev-x86_64-20250420-git-3600c71.7z?viasf=1"
          Invoke-WebRequest -Uri $url -OutFile mpv-dev.7z -UserAgent "Wget"
          $size = (Get-Item mpv-dev.7z).Length
          if ($size -lt 1MB) {
            Write-Error "MPV download too small ($size bytes) — likely an HTML error page, not the archive"
            exit 1
          }
          # 20250420 archive ships libmpv.dll.a directly — no .def, no need
          # to regenerate the import lib via `lib /def:`. Layout under MPV_DIR
          # already matches what Plazma's CMake expects (include/, libmpv.dll.a).
          7z x mpv-dev.7z -ompv-sdk
          if (-not (Test-Path mpv-sdk/libmpv.dll.a)) {
            Write-Host "Extracted contents:"
            Get-ChildItem -Path mpv-sdk -Recurse | ForEach-Object { Write-Host $_.FullName }
            Write-Error "libmpv.dll.a not found at mpv-sdk root after extract"
            exit 1
          }

      - name: Build Plazma
        shell: pwsh
        env:
          MPV_DIR: ${{ github.workspace }}/mpv-sdk
        run: |
          cmake -B Plazma/build -S Plazma -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DCMAKE_DISABLE_FIND_PACKAGE_PkgConfig=ON `
            -DTd_DIR=C:/tdlib-install/lib/cmake/Td
          cmake --build Plazma/build
          Push-Location Plazma/build
          cpack -G ZIP
          Pop-Location

      - name: Upload Windows zip
        uses: actions/upload-artifact@v4
        with:
          name: plazma-windows
          path: Plazma/build/*.zip
          if-no-files-found: error
          retention-days: 14

      - name: Debug via tmate (on failure, ci-* branches and manual dispatch only)
        if: |
          failure() && (
            startsWith(github.ref_name, 'ci-') ||
            github.event_name == 'workflow_dispatch'
          )
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 5
        with:
          limit-access-to-actor: true
